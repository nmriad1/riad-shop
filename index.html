<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dealer Software</title>

<style>
body {font-family: Arial; margin:0; background:#f2f2f2;}
header {background:black; color:white; text-align:center; padding:15px;}
.box {background:white; margin:10px; padding:15px; border-radius:10px;}
input, button {width:100%; padding:10px; margin-top:5px;}
button {background:green; color:white; border:none;}
</style>
</head>

<body>

<header>
<h2>Dealer Management</h2>
</header>

<div class="box">
<h3>Add Product</h3>
<input id="pname" placeholder="Product Name">
<input id="pcost" placeholder="Cost Price">
<input id="pprice" placeholder="Sale Price">
<input id="pqty" placeholder="Quantity">
<button onclick="addProduct()">Add Product</button>
</div>

<div class="box">
<h3>Sell Product</h3>
<input id="sellname" placeholder="Product Name">
<input id="sellqty" placeholder="Quantity">
<button onclick="sellProduct()">Sell</button>
</div>

<div class="box">
<h3>Dashboard</h3>
<p>Total Sales: <span id="sales">0</span></p>
<p>Total Profit: <span id="profit">0</span></p>
</div>

<div class="box">
<h3>Product List</h3>
<div id="list"></div>
</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];
let totalSales = parseInt(localStorage.getItem("sales")) || 0;
let totalProfit = parseInt(localStorage.getItem("profit")) || 0;

function save() {
  localStorage.setItem("products", JSON.stringify(products));
  localStorage.setItem("sales", totalSales);
  localStorage.setItem("profit", totalProfit);
}

function addProduct() {
  let name = pname.value;
  let cost = parseInt(pcost.value);
  let price = parseInt(pprice.value);
  let qty = parseInt(pqty.value);

  products.push({name, cost, price, qty});
  save();
  show();
}

function sellProduct() {
  let name = sellname.value;
  let qty = parseInt(sellqty.value);

  let p = products.find(x => x.name === name);

  if(p && p.qty >= qty){
    p.qty -= qty;
    totalSales += p.price * qty;
    totalProfit += (p.price - p.cost) * qty;
    save();
    show();
  } else {
    alert("Not enough stock!");
  }
}

function show() {
  list.innerHTML = "";
  products.forEach(p=>{
    list.innerHTML += `<p>${p.name} | Stock: ${p.qty}</p>`;
  });

  sales.innerText = totalSales;
  profit.innerText = totalProfit;
}

show();
</script>

</body>
</html>
