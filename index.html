<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dealer Software</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f2f2f2;
}

header {
  background: black;
  color: white;
  text-align: center;
  padding: 15px;
}

.box {
  background: white;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
}

button {
  background: green;
  color: white;
  border: none;
}

.product {
  border: 1px solid #ddd;
  padding: 10px;
  margin-top: 5px;
}
</style>
</head>

<body>

<header>
<h2>Dealer Management</h2>
</header>

<div class="box">
<h3>Add Product</h3>
<input id="name" placeholder="Product Name">
<input id="cost" placeholder="Cost Price" type="number">
<input id="price" placeholder="Sale Price" type="number">
<input id="qty" placeholder="Quantity" type="number">
<button onclick="addProduct()">Add Product</button>
</div>

<div class="box">
<h3>Sell Product</h3>
<input id="sellName" placeholder="Product Name">
<input id="sellQty" placeholder="Quantity" type="number">
<button onclick="sellProduct()">Sell</button>
</div>

<div class="box">
<h3>Dashboard</h3>
<p>Total Sales: <span id="sales">0</span></p>
<p>Total Profit: <span id="profit">0</span></p>
</div>

<div class="box">
<h3>Product List</h3>
<div id="list"></div>
</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];
let totalSales = 0;
let totalProfit = 0;

function saveData() {
  localStorage.setItem("products", JSON.stringify(products));
}

function addProduct() {
  let name = document.getElementById("name").value;
  let cost = Number(document.getElementById("cost").value);
  let price = Number(document.getElementById("price").value);
  let qty = Number(document.getElementById("qty").value);

  products.push({name, cost, price, qty});
  saveData();
  showProducts();
}

function showProducts() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  products.forEach(p => {
    list.innerHTML += `
    <div class="product">
      ${p.name} | Qty: ${p.qty} | Price: ${p.price}
    </div>`;
  });
}

function sellProduct() {
  let name = document.getElementById("sellName").value;
  let qty = Number(document.getElementById("sellQty").value);

  let product = products.find(p => p.name === name);

  if (product && product.qty >= qty) {
    product.qty -= qty;
    totalSales += product.price * qty;
    totalProfit += (product.price - product.cost) * qty;

    document.getElementById("sales").innerText = totalSales;
    document.getElementById("profit").innerText = totalProfit;

    saveData();
    showProducts();
  } else {
    alert("Product not found or not enough stock");
  }
}

showProducts();
</script>

</body>
</html>
