<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dealer Software</title>

<style>
body {font-family: Arial; margin:0; background:#f2f2f2;}
header {background:black; color:white; text-align:center; padding:15px;}
.box {background:white; margin:10px; padding:15px; border-radius:10px;}
input, button {width:100%; padding:10px; margin-top:5px;}
button {background:green; color:white; border:none;}
.product {border:1px solid #ddd; padding:10px; margin-top:5px;}
</style>
</head>

<body>

<header>
<h2>Dealer Management</h2>
</header>

<div class="box">
<h3>Add Product</h3>
<input id="name" placeholder="Product Name">
<input id="cost" type="number" placeholder="Cost Price">
<input id="price" type="number" placeholder="Sale Price">
<input id="qty" type="number" placeholder="Quantity">
<button onclick="addProduct()">Add Product</button>
</div>

<div class="box">
<h3>Sell Product</h3>
<input id="sellName" placeholder="Product Name">
<input id="sellQty" type="number" placeholder="Quantity">
<button onclick="sellProduct()">Sell</button>
</div>

<div class="box">
<h3>Dashboard</h3>
<p>Total Sales: <span id="sales">0</span></p>
<p>Total Profit: <span id="profit">0</span></p>
</div>

<div class="box">
<h3>Product List</h3>
<div id="list"></div>
</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];
let totalSales = Number(localStorage.getItem("sales")) || 0;
let totalProfit = Number(localStorage.getItem("profit")) || 0;

function saveAll() {
  localStorage.setItem("products", JSON.stringify(products));
  localStorage.setItem("sales", totalSales);
  localStorage.setItem("profit", totalProfit);
}

function addProduct() {
  let name = document.getElementById("name").value.trim();
  let cost = Number(document.getElementById("cost").value);
  let price = Number(document.getElementById("price").value);
  let qty = Number(document.getElementById("qty").value);

  if(!name) return alert("Enter product name");

  let existing = products.find(p => p.name === name);

  if(existing){
    existing.qty += qty;
  } else {
    products.push({name, cost, price, qty});
  }

  saveAll();
  showProducts();
}

function showProducts() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  products.forEach(p => {
    list.innerHTML += `
    <div class="product">
      <b>${p.name}</b><br>
      Qty: ${p.qty} | Price: ${p.price}
    </div>`;
  });

  document.getElementById("sales").innerText = totalSales;
  document.getElementById("profit").innerText = totalProfit;
}

function sellProduct() {
  let name = document.getElementById("sellName").value.trim();
  let qty = Number(document.getElementById("sellQty").value);

  let product = products.find(p => p.name === name);

  if(product && product.qty >= qty){
    product.qty -= qty;

    totalSales += product.price * qty;
    totalProfit += (product.price - product.cost) * qty;

    saveAll();
    showProducts();
  } else {
    alert("Product not found or stock low");
  }
}

showProducts();
</script>

</body>
</html>
